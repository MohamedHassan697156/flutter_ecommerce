name: flutter_ecommerce
description: A full-featured e-commerce app built with Flutter & Clean Architecture.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.4
  get_it: ^7.6.7
  go_router: ^13.2.0
  hive_flutter: ^1.1.0
  cached_network_image: ^3.3.1
  equatable: ^2.0.5
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  mockito: ^5.4.4
  bloc_test: ^9.1.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
